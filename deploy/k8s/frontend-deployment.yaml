apiVersion: apps/v1
kind: Deployment
metadata:
  name: deadchat-frontend
  namespace: deadchat
  labels:
    app: deadchat
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deadchat
      component: frontend
  template:
    metadata:
      labels:
        app: deadchat
        component: frontend
    spec:
      containers:
        - name: frontend
          image: deadchat-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
