apiVersion: apps/v1
kind: Deployment
metadata:
  name: deadchat-backend
  namespace: deadchat
  labels:
    app: deadchat
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deadchat
      component: backend
  template:
    metadata:
      labels:
        app: deadchat
        component: backend
    spec:
      containers:
        - name: backend
          image: deadchat-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: deadchat-secret
                  key: JWT_SECRET
            - name: OLLAMA_URL
              valueFrom:
                configMapKeyRef:
                  name: deadchat-config
                  key: OLLAMA_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: deadchat-config
                  key: OLLAMA_MODEL
            - name: MAX_FILE_SIZE
              valueFrom:
                configMapKeyRef:
                  name: deadchat-config
                  key: MAX_FILE_SIZE
            - name: DB_PATH
              value: /data/deadchat.db
            - name: UPLOAD_DIR
              value: /data/uploads
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: deadchat-backend-data
