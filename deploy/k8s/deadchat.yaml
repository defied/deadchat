---
apiVersion: v1
kind: Namespace
metadata:
  name: deadchat
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: deadchat-config
  namespace: deadchat
data:
  OLLAMA_URL: "http://192.168.0.106:11434"
  OLLAMA_MODEL: "gemma4"
  MAX_FILE_SIZE: "10485760"
  DB_PATH: "/data/deadchat.db"
  UPLOAD_DIR: "/data/uploads"
  PORT: "3000"
  DEBUG_OLLAMA_REQUESTS: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deadchat-backend
  namespace: deadchat
  labels:
    app.kubernetes.io/name: deadchat-backend
    app.kubernetes.io/part-of: deadchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deadchat-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deadchat-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/defied/deadchat-backend:9e10418c5534
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: deadchat-config
            - secretRef:
                name: deadchat-secret
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          hostPath:
            path: /opt/deadchat-data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: deadchat-backend
  namespace: deadchat
  labels:
    app.kubernetes.io/name: deadchat-backend
    app.kubernetes.io/part-of: deadchat
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/name: deadchat-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deadchat-frontend
  namespace: deadchat
  labels:
    app.kubernetes.io/name: deadchat-frontend
    app.kubernetes.io/part-of: deadchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: deadchat-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deadchat-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/defied/deadchat-frontend:9e10418c5534
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
            - name: status
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: deadchat-frontend
  namespace: deadchat
  labels:
    app.kubernetes.io/name: deadchat-frontend
    app.kubernetes.io/part-of: deadchat
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: status
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: deadchat-frontend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deadchat
  namespace: deadchat
  labels:
    app.kubernetes.io/name: deadchat
    app.kubernetes.io/part-of: deadchat
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - deadchat.deadplanet.net
      secretName: deadchat-tls
  rules:
    - host: deadchat.deadplanet.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deadchat-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: deadchat-backend
                port:
                  number: 3000
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: deadchat-backend
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: deadchat-backend
                port:
                  number: 3000
