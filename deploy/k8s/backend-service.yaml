apiVersion: v1
kind: Service
metadata:
  name: deadchat-backend
  namespace: deadchat
  labels:
    app: deadchat
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: deadchat
    component: backend
