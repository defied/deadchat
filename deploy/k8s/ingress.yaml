apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deadchat-ingress
  namespace: deadchat
  labels:
    app: deadchat
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - deadchat.deadplanet.net
      secretName: deadchat-tls
  rules:
    - host: deadchat.deadplanet.net
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: deadchat-backend
                port:
                  number: 3000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: deadchat-backend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deadchat-frontend
                port:
                  number: 80
