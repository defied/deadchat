# Managed out-of-band; NOT synced by ArgoCD (this repo is public).
#
# The Prune=false annotation prevents ArgoCD from deleting this secret
# during sync, even when --prune is passed. It must be on the live resource.
#
# To (re)create the live Secret:
#   JWT=$(openssl rand -hex 32)
#   kubectl -n deadchat create secret generic deadchat-secret \
#     --from-literal=JWT_SECRET="$JWT" \
#     --dry-run=client -o yaml \
#   | kubectl annotate --local -f - \
#     argocd.argoproj.io/sync-options=Prune=false -o yaml \
#   | kubectl apply -f -
#
# Verify the annotation is present before any ArgoCD sync:
#   kubectl -n deadchat get secret deadchat-secret \
#     -o jsonpath='{.metadata.annotations.argocd\.argoproj\.io/sync-options}'
apiVersion: v1
kind: Secret
metadata:
  name: deadchat-secret
  namespace: deadchat
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
stringData:
  JWT_SECRET: REPLACE_ME
