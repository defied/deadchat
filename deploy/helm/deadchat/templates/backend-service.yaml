apiVersion: v1
kind: Service
metadata:
  name: {{ include "deadchat.fullname" . }}-backend
  labels:
    {{- include "deadchat.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "deadchat.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
